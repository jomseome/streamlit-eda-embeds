      const ratio = Math.max(0, Math.min(1, mix));
      const softened = [r, g, b].map(function(value) {
        return Math.round(value + (255 - value) * ratio);
      });
      return "#" + softened.map(function(value) { return value.toString(16).padStart(2, "0"); }).join("");
    }

    function rawArrayLength(value) {
      if (Array.isArray(value)) {
        if (value.length > 0 && value.every(function(item) { return Array.isArray(item); })) {
          return value.reduce(function(maxLen, item) {
            return Math.max(maxLen, item.length);
          }, 0);
        }
        return value.length;
      }
      if (value && typeof value.length === "number") return value.length;
      return 0;
    }

    function pointCount(trace, traceIndex) {
      let count = rawArrayLength(trace && trace.x);
      if (count) return count;
      count = rawArrayLength(trace && trace.y);
      if (count) return count;
      count = rawArrayLength(trace && trace.labels);
      if (count) return count;
      const renderedTrace = (el.data || [])[traceIndex] || {};
      count = rawArrayLength(renderedTrace.x);
      if (count) return count;
      count = rawArrayLength(renderedTrace.y);
      if (count) return count;
      count = rawArrayLength(renderedTrace.labels);
      if (count) return count;
      const calcTrace = (el.calcdata || [])[traceIndex] || [];
      count = rawArrayLength(calcTrace);
      if (count) return count;
      return 0;
    }

    function isSplitTimeSeriesTrace(trace) {
      const kind = trace.type || "";
      const mode = String(trace.mode || "");
      return (kind === "scatter" || kind === "scattergl") && mode.includes("lines") && mode.includes("markers");
    }

    function suppressNativeHoverLabel(trace) {
      if (showNativeHoverLabels || !trace) return trace;
      trace.hovertemplate = "<extra></extra>";
      trace.hoverinfo = "none";
      return trace;
    }

    function buildInteractiveFigure() {
      const figure = deepClone(originalFigure);
      const traces = [];
      (figure.data || []).forEach(function(trace, originalIndex) {
        if (!isSplitTimeSeriesTrace(trace)) {
          trace._interactiveOriginalIndex = originalIndex;
          trace._interactiveRole = "single";
          suppressNativeHoverLabel(trace);
          traces.push(trace);
          return;
        }

        const lineTrace = deepClone(trace);
        lineTrace.mode = "lines";
        lineTrace.hovertemplate = "<extra></extra>";
        lineTrace.hoverinfo = "none";
        lineTrace.showlegend = trace.showlegend;
        lineTrace._interactiveOriginalIndex = originalIndex;
        lineTrace._interactiveRole = "line";
        traces.push(lineTrace);

        const hitboxTrace = deepClone(trace);
        hitboxTrace.mode = "lines";
        hitboxTrace.showlegend = false;
        hitboxTrace.hovertemplate = "<extra></extra>";
        hitboxTrace.hoverinfo = "none";
        hitboxTrace.line = Object.assign({}, hitboxTrace.line || {}, {
          color: "rgba(0,0,0,0.001)",
          width: Math.max(Number((hitboxTrace.line || {}).width || 2) * 6, 18),
        });
        hitboxTrace._interactiveOriginalIndex = originalIndex;
        hitboxTrace._interactiveRole = "hitbox";
        traces.push(hitboxTrace);

        const markerTrace = deepClone(trace);
        markerTrace.mode = "markers";
        markerTrace.showlegend = false;
        markerTrace._interactiveOriginalIndex = originalIndex;
        markerTrace._interactiveRole = "marker";
        suppressNativeHoverLabel(markerTrace);
        traces.push(markerTrace);
      });
      figure.data = traces;
      return figure;
    }

    function neutralizeTrace(trace, traceIndex) {
      const t = deepClone(trace);
      const kind = t.type || "";
      const count = pointCount(t, -1);
      if (kind === "bar" || kind === "histogram" || kind === "funnel") {
        if (coloredIdle) {
          const baseColor = traceHighlightColor(traceIndex);
          const fillColor = softenedColor(baseColor, idleColorMix);
          const lineColor = softenedColor(baseColor, Math.max(0, idleColorMix - 0.14));
          t.marker = Object.assign({}, t.marker || {}, {
            color: count ? normalizedArray(count, fillColor) : fillColor,
            line: Object.assign({}, (t.marker || {}).line || {}, {
              color: count ? normalizedArray(count, lineColor) : lineColor
            })
          });
          return t;
        }
        t.marker = Object.assign({}, t.marker || {}, {
          color: count ? normalizedArray(count, neutralBarFill) : neutralBarFill,
          line: Object.assign({}, (t.marker || {}).line || {}, {
            color: count ? normalizedArray(count, neutralBarLine) : neutralBarLine
          })
        });
        return t;
      }
      if (kind === "scatter" || kind === "scattergl" || kind === "box" || kind === "violin") {
        if (t._interactiveRole === "hitbox") {
          t.line = Object.assign({}, t.line || {}, { color: "rgba(0,0,0,0)" });
          return t;
        }
        if (coloredIdle) {
          const baseColor = traceHighlightColor(traceIndex);
          const lineColor = softenedColor(baseColor, idleColorMix);
          const markerColor = softenedColor(baseColor, Math.max(0, idleColorMix - 0.1));
          if (t._interactiveRole !== "marker") {
            t.line = Object.assign({}, t.line || {}, { color: lineColor });
          }
          if (t._interactiveRole !== "line") {
            t.marker = Object.assign({}, t.marker || {}, { color: markerColor });
          }
          if (typeof t.fill === "string" && t.fill !== "none") {
            t.fillcolor = colorWithAlpha(lineColor, 0.18);
          }
          return t;
        }
        if (t._interactiveRole !== "marker") {
          t.line = Object.assign({}, t.line || {}, { color: neutralLineColor });
        }
        if (t._interactiveRole !== "line") {
          t.marker = Object.assign({}, t.marker || {}, { color: neutralMarkerColor });
        }
        if (typeof t.fill === "string" && t.fill !== "none") {
          t.fillcolor = neutralFillColor;
        }
        return t;
      }
      if (coloredIdle) {
        const baseColor = traceHighlightColor(traceIndex);
        t.marker = Object.assign({}, t.marker || {}, { color: softenedColor(baseColor, idleColorMix) });
        return t;
      }
      t.marker = Object.assign({}, t.marker || {}, { color: neutralMarkerColor });
      return t;
    }

    const interactiveFigure = buildInteractiveFigure();

    function applyLegendVisibility(figure) {
      if (!hiddenLegendLabels.size) {
        return figure;
      }
      figure.data = (figure.data || []).map(function(trace) {
        if (trace && hiddenLegendLabels.has(String(trace.name || ""))) {
          trace.visible = false;
        }
        return trace;
      });
      return figure;
    }

    function buildBaseFigure() {
      if (!grayscaleEnabled && !coloredIdle) {
        return applyLegendVisibility(deepClone(interactiveFigure));
      }
      const neutral = deepClone(interactiveFigure);
      neutral.data = (neutral.data || []).map(function(trace, traceIndex) {
        return neutralizeTrace(trace, traceIndex);
      });
      return applyLegendVisibility(neutral);
    }

    function restoreBaseState() {
      const base = buildBaseFigure();
      return Plotly.react(
        el,
        base.data || [],
        stableLayout(base.layout || baseLayout),
        config
      );
    }

    const hoverResetAttrs = new Map();

    function traceAttr(trace, attr) {
      return attr.split(".").reduce(function(value, key) {
        return value == null ? undefined : value[key];
      }, trace || {});
    }

    function resetUpdateForTrace(traceIndex, attrs) {
      const baseTrace = (buildBaseFigure().data || [])[traceIndex] || {};
      const update = {};
      attrs.forEach(function(attr) {
        const value = traceAttr(baseTrace, attr);
        update[attr] = [value === undefined ? null : deepClone(value)];
      });
      return update;
    }

    function resetHoverStyles() {
      const jobs = [];
      hoverResetAttrs.forEach(function(attrs, traceIndex) {
        jobs.push(Plotly.restyle(el, resetUpdateForTrace(Number(traceIndex), attrs), [Number(traceIndex)]));
      });
      hoverResetAttrs.clear();
      return Promise.all(jobs);
    }

    function restyleHoverTrace(traceIndex, update) {
      const attrs = hoverResetAttrs.get(traceIndex) || new Set();
      Object.keys(update).forEach(function(attr) {
        attrs.add(attr);
      });
      hoverResetAttrs.set(traceIndex, attrs);
      return Plotly.restyle(el, update, [traceIndex]);
    }

    function elementHasClass(node, className) {
      let current = node;
      while (current) {
        if (current.classList && current.classList.contains(className)) {
          return true;
        }
        current = current.parentNode;
      }
      return false;
    }

    function cursorElements(event) {
      const source = event && event.event;
      const clientX = source && typeof source.clientX === "number" ? source.clientX : null;
      const clientY = source && typeof source.clientY === "number" ? source.clientY : null;
      if (clientX === null || clientY === null || typeof document === "undefined") {
        return [];
      }
      if (typeof document.elementsFromPoint === "function") {
        return document.elementsFromPoint(clientX, clientY) || [];
      }
      if (typeof document.elementFromPoint === "function") {
        const node = document.elementFromPoint(clientX, clientY);
        return node ? [node] : [];
      }
      return [];
    }

    function isPointHover(event, traceIndex) {
      const trace = (interactiveFigure.data || [])[traceIndex] || {};
      if (trace._interactiveRole === "marker" || trace._interactiveRole === "single") {
        return true;
      }
      const hoveredElements = cursorElements(event);
      return hoveredElements.some(function(node) {
        return elementHasClass(node, "point");
      });
    }

    function baseMarkerSize(traceIndex) {
      if (baseMarkerSizes.has(traceIndex)) {
        return baseMarkerSizes.get(traceIndex);
      }
      const trace = (interactiveFigure.data || [])[traceIndex] || {};
      const marker = trace.marker || {};
      let size = marker.size;
      if (Array.isArray(size)) {
        size = Number(size[0]);
      }
      if (!Number.isFinite(size)) {
        size = 8;
      }
      baseMarkerSizes.set(traceIndex, size);
      return size;
    }

    function highlightedMarkerSize(size) {
      return Math.max(size + hoverMarkerBoost + 4, size * 2.25);
    }

    function sourceColorArray(rawColor, count, fallback) {
      if (Array.isArray(rawColor)) {
        return rawColor.slice(0, count);
      }
      if (typeof rawColor === "string") {
        return normalizedArray(count, rawColor);
      }
      return normalizedArray(count, fallback);
    }

    function sourceNumberArray(rawValue, count, fallback) {
      if (Array.isArray(rawValue)) {
        return rawValue.slice(0, count);
      }
      if (Number.isFinite(Number(rawValue))) {
        return normalizedArray(count, Number(rawValue));
      }
      return normalizedArray(count, fallback);
    }

    function buildHighlightUpdate(traceIndex, pointIndex, emphasizePoint) {
      const sourceTrace = deepClone((interactiveFigure.data || [])[traceIndex] || {});
      const kind = sourceTrace.type || "";
      const color = hoverHighlightColor || traceHighlightColor(traceIndex);
      const darkColor = hoverHighlightColor || darkerColor(color, 0.68);
      const update = {};
      if (kind === "bar" || kind === "histogram" || kind === "funnel") {
        const count = pointCount(sourceTrace, traceIndex);
        const fillColors = grayscaleEnabled
          ? normalizedArray(count, neutralBarFill)
          : sourceColorArray((sourceTrace.marker || {}).color, count, color);
        if (pointIndex >= 0 && pointIndex < count) {
          fillColors[pointIndex] = darkColor;
        }
        update["marker.color"] = [fillColors];
        return update;
      }
      const count = pointCount(sourceTrace, traceIndex);
      if (sourceTrace._interactiveRole === "line") {
        update["line.color"] = [darkColor];
        return update;
      }

      if (sourceTrace._interactiveRole === "hitbox") {
        update["line.color"] = ["rgba(0,0,0,0)"];
        return update;
      }

      if (sourceTrace._interactiveRole === "marker") {
        const markerColors = grayscaleEnabled
          ? normalizedArray(count, emphasizePoint ? colorWithAlpha(color, 0.35) : neutralMarkerColor)
          : sourceColorArray((sourceTrace.marker || {}).color, count, colorWithAlpha(color, 0.45));
        if (highlightTraceMarkers) {
          for (let index = 0; index < count; index += 1) {
            markerColors[index] = colorWithAlpha(color, 0.8);
          }
        }
        if (emphasizePoint && pointIndex >= 0 && pointIndex < count) {
          markerColors[pointIndex] = darkColor;
        }
        update["marker.color"] = [markerColors];
      } else {
        update["line.color"] = [darkColor];
        if (count > 0) {
          const markerColors = grayscaleEnabled
            ? normalizedArray(count, neutralMarkerColor)
            : sourceColorArray((sourceTrace.marker || {}).color, count, colorWithAlpha(color, 0.45));
          if (highlightTraceMarkers) {
            for (let index = 0; index < count; index += 1) {
              markerColors[index] = colorWithAlpha(color, 0.8);
            }
          }
          if (emphasizePoint && pointIndex >= 0 && pointIndex < count) {
            markerColors[pointIndex] = darkColor;
          }
          update["marker.color"] = [markerColors];
        } else {
          update["marker.color"] = [darkColor];
        }
        if (typeof sourceTrace.fill === "string" && sourceTrace.fill !== "none") {
          update.fillcolor = [colorWithAlpha(color, 0.18)];
        }
      }
      return update;
    }

    function pairedLineTraceIndex(traceIndex) {
      const trace = (interactiveFigure.data || [])[traceIndex] || {};
      if (trace._interactiveRole !== "marker" && trace._interactiveRole !== "hitbox") {
        return traceIndex;
      }
      const originalIndex = trace._interactiveOriginalIndex;
      return (interactiveFigure.data || []).findIndex(function(candidate) {
        return candidate._interactiveOriginalIndex === originalIndex && candidate._interactiveRole === "line";
      });
    }

    function pairedMarkerTraceIndex(traceIndex) {
      const trace = (interactiveFigure.data || [])[traceIndex] || {};
      if (trace._interactiveRole === "single") {
        return traceIndex;
      }
      const originalIndex = trace._interactiveOriginalIndex;
      return (interactiveFigure.data || []).findIndex(function(candidate) {
        return candidate._interactiveOriginalIndex === originalIndex && candidate._interactiveRole === "marker";
      });
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(value);
      }
      return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
    }

    function traceDomNode(traceIndex) {
      const fullTrace = (el && el._fullData && el._fullData[traceIndex]) || {};
      if (fullTrace.uid) {
        const byUid = document.querySelector("." + cssEscape("trace" + fullTrace.uid));
        if (byUid) return byUid;
      }
      const nodes = Array.from(document.querySelectorAll(".scatterlayer .trace, .barlayer .trace"));
      return nodes[traceIndex] || null;
    }

    function clearDomHoverStyles() {
      document.querySelectorAll(".kossda-dom-hover").forEach(function(node) {
        node.classList.remove("kossda-dom-hover");
      });
      document.querySelectorAll(".kossda-dom-hover-point").forEach(function(node) {
        node.classList.remove("kossda-dom-hover-point");
      });
    }

    function applyDomHoverTrace(traceIndex, pointIndex) {
      if (traceIndex < 0) return;
      const node = traceDomNode(traceIndex);
      if (!node) return;
      node.classList.add("kossda-dom-hover");
      if (pointIndex >= 0) {
        const pointNodes = node.querySelectorAll(".points path, path.point, path");
        if (pointNodes && pointNodes[pointIndex]) {
          pointNodes[pointIndex].classList.add("kossda-dom-hover-point");
        }
      }
    }

    Plotly.newPlot(el, buildBaseFigure().data || [], layout, config).then(function() {
      if (Array.isArray(originalFigure.frames) && originalFigure.frames.length > 0) {
        Plotly.addFrames(el, originalFigure.frames);
      }
    });

    function updateLegendButtons() {
      legendButtons.forEach(function(button) {
        const label = button.getAttribute("data-legend-label") || "";
        const isHidden = hiddenLegendLabels.has(label);
        button.classList.toggle("is-muted", isHidden);
        button.setAttribute("aria-pressed", isHidden ? "false" : "true");
      });
    }

    legendButtons.forEach(function(button) {
      button.addEventListener("click", function() {
        const label = button.getAttribute("data-legend-label") || "";
        if (!label) return;
        if (hiddenLegendLabels.has(label)) {
          hiddenLegendLabels.delete(label);
        } else {
          hiddenLegendLabels.add(label);
        }
        updateLegendButtons();
        restoreBaseState();
      });
    });

    if (enablePlotlyHoverRestyle) {
      el.on("plotly_hover", function(event) {
        const point = event && event.points && event.points[0];
        if (!point) return;
        isHoveringPlot = true;
        resetHoverStyles().then(function() {
          const targetTraceIndex = point.curveNumber;
          const lineTraceIndex = pairedLineTraceIndex(targetTraceIndex);
          const shouldColorizeLine = lineHoverMode === "line_and_point";
          if (shouldColorizeLine && lineTraceIndex >= 0) {
            const lineUpdate = buildHighlightUpdate(lineTraceIndex, point.pointNumber, false);
            restyleHoverTrace(lineTraceIndex, lineUpdate);
          }
          const markerTraceIndex = pairedMarkerTraceIndex(targetTraceIndex);
          if (markerTraceIndex >= 0) {
            const pointUpdate = buildHighlightUpdate(markerTraceIndex, point.pointNumber, true);
            restyleHoverTrace(markerTraceIndex, pointUpdate);
          }
        });
      });

      el.on("plotly_unhover", function() {
        resetHoverStyles().then(function() {
          isHoveringPlot = false;
          resizePlot();
        });
      });
    } else {
      el.on("plotly_hover", function(event) {
        const point = event && event.points && event.points[0];
        if (!point) return;
        isHoveringPlot = true;
        clearDomHoverStyles();
        const targetTraceIndex = point.curveNumber;
        const lineTraceIndex = pairedLineTraceIndex(targetTraceIndex);
        const markerTraceIndex = pairedMarkerTraceIndex(targetTraceIndex);
        applyDomHoverTrace(lineTraceIndex, -1);
        applyDomHoverTrace(markerTraceIndex, point.pointNumber);
        if (lineTraceIndex < 0 && markerTraceIndex < 0) {
          applyDomHoverTrace(targetTraceIndex, point.pointNumber);
        }
      });

      el.on("plotly_unhover", function() {
        clearDomHoverStyles();
        isHoveringPlot = false;
        resizePlot();
      });
    }

    downloadChartButton.addEventListener("click", function() {
      Plotly.downloadImage(el, {
        format: "png",
        filename: imageBaseName,
        width: 1400,
        height: 550
      });
    });

    if (!excelDownloadUrl) {
      downloadDataLink.style.display = "none";
    } else {
      downloadDataLink.setAttribute("download", excelDownloadName || "chart-data.xlsx");
    }

    window.addEventListener("resize", function() {
      resizePlot();
    });
    
    let lastPlotSize = null;
    function resizePlot() {
      if (!enableDynamicResize) return;
      if (isHoveringPlot) return;
      if (!el || !el.offsetWidth) return;
      const measuredSize = plotAreaSize();
      if (
        lastPlotSize &&
        lastPlotSize.width === measuredSize.width &&
        lastPlotSize.height === measuredSize.height
      ) {
        return;
      }
      lastPlotSize = measuredSize;
      const nextLayout = stableLayout((el && el.layout) || baseLayout);
      Plotly.relayout(el, { width: nextLayout.width, height: nextLayout.height });
    }
    if ("ResizeObserver" in window) {
      const observer = new ResizeObserver(function() {
        window.requestAnimationFrame(resizePlot);
      });
      observer.observe(document.body);
      observer.observe(el);
      if (plotArea) observer.observe(plotArea);
    }
    [60, 160, 360, 800, 1400].forEach(function(delay) {
      window.setTimeout(resizePlot, delay);
    });
    document.addEventListener("visibilitychange", resizePlot);
  </script>
</body>
</html>
